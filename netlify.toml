# Netlify configuration for the NEXUS frontend.
#
# Usage: in the Netlify dashboard, "Add new site" -> "Import an existing
# project", point it at this repo, and set "Base directory" to `frontend`
# when prompted (or leave the settings below to handle it — Netlify reads
# this file from the repo root and the `base` key tells it where to build).
#
# The official @netlify/plugin-nextjs handles SSR/API routes/middleware
# automatically — no static export needed, so nothing in the app itself
# has to change to run here.

[build]
  base = "frontend"
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Environment variables (NEXT_PUBLIC_API_URL, NEXT_PUBLIC_WS_URL,
# NEXTAUTH_SECRET, NEXTAUTH_URL) are set in the Netlify dashboard under
# Site settings -> Environment variables, not here — see the deployment
# walkthrough for exact values once your Render backend URL is known.
